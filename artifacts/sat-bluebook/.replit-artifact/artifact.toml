kind = "web"
previewPath = "/"
title = "SAT Bluebook"
version = "1.0.0"
id = "artifacts/sat-bluebook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18119

[services.development]
run = "pnpm --filter @workspace/sat-bluebook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sat-bluebook", "run", "build" ]
publicDir = "artifacts/sat-bluebook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18119"
BASE_PATH = "/"
